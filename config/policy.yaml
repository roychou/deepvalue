# L6 verdict + sizing policy (spec §10). Deterministic.
#
# STRATEGY: "Tedium Premium" — a long-only, asset-backed deep-value micro-cap book whose
# distinctive edge is the "MD&A Deterioration Lead" indicator (forensic YoY reading of
# 10-K language that leads hard distress events by ~3-6 months; validated June 2026, see
# notes/what-we-validated.md + notes/tedium-premium-strategy.md).
#
# POSTURE: statistical breadth, NOT deep concentration. The validated per-name edge (IC ~+0.1)
# is modest; by Grinold's law (skill ~ IC*sqrt(breadth)) it needs breadth to express reliably
# and to survive the ~1-in-5 micro-cap blowup rate. So hold 30-40 names, not 15.
posture: breadth_value
max_positions: 35            # 30-40 band — breadth lets the modest edge work statistically
min_conviction_to_buy: 0.60  # lower bar than deep-conviction; breadth does the work
min_margin_of_safety: 0.40   # require ~40% discount to conservative asset value (downside = assets, not stops)
sizing: fractional_kelly
kelly_fraction: 0.25         # capped; never full Kelly
max_position_weight: 0.06    # hard cap per name (~1/max_positions floor; diversified, not concentrated)
cash_ok: true                # holding cash when nothing qualifies is a valid state
illiquidity_aware: true      # scale size down by ADV — this is where the edge lives
liquidity_floor_adv_usd: 50000
exclude_sectors: [banks, insurers, blank_check]

# The system emits a recommendation artifact (TargetBook) for a human. It takes no trading action.
human_signoff_required: true   # spec §16 — every BUY requires human sign-off
